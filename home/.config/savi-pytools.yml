user_preferences:
  aws_all_profiles:
  - infra-sso-admin
  - test-sso-admin
  - play-sso-admin
  aws_default_access_level:
    mgmt: admin
    security: admin
    infra: admin
    test: admin
    play: admin
    stage: admin
    prod: admin
    dns: admin
  aws_all_account_levels:
    mgmt:
    - read
    - power
    - admin
    infra:
    - read
    - power
    - admin
    test:
    - read
    - power
    - admin
    play:
    - read
    - power
    - admin
    prod:
    - read
    - power
    - admin
  all_extra_commands:
  - codeartifact
  - ecr
codeartifact:
  account: infra
  profile_override: infra-device-read
  repos:
  - name: pypi-test
    tools:
    - uv
  - name: pypi-release
    tools:
    - uv
  - name: npm-test
    tools:
    - npm
  - name: npm-release
    tools:
    - npm
  - name: maven-test
    tools:
    - mvn
  - name: maven-release
    tools:
    - mvn
  - name: swift-test
    tools:
    - swift
  - name: swift-release
    tools:
    - swift
ecr:
  account: infra
  profile_override: infra-device-read
deploy:
  repos:
  - name: flock
    path: ~/code/github/savi/flock
  - name: Scamwise
    path: ~/code/github/savi/scamwise-service
  - name: Phony
    path: ~/code/github/savi/phony
  - name: re-scam
    path: ~/code/github/savi/re-scam
  - name: user
    path: ~/code/github/savi/user
  - name: voice-agent
    path: ~/code/github/savi/voice-agent
  - name: db
    path: ~/code/github/savi/db
  - name: scamwise-ui
    path: ~/code/github/savi/scamwise-ui
slack:
  profile_override: test-device-elevated
  display_name: Michael Knopf
  icon_emoji: ':rick-drool:'
