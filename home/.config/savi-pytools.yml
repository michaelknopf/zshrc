user_preferences:
  aws_all_profiles:
  - infra-sso-admin
  - test-sso-admin
  - play-sso-admin
  aws_default_access_level:
    mgmt: admin
    security: admin
    infra: admin
    test: admin
    play: admin
    stage: admin
    prod: admin
    dns: admin
  aws_all_account_levels:
    mgmt:
    - read
    - power
    - admin
    infra:
    - read
    - power
    - admin
    test:
    - read
    - power
    - admin
    play:
    - read
    - power
    - admin
    prod:
    - read
    - power
    - admin
  all_extra_commands:
  - codeartifact
  - ecr
codeartifact:
  account: infra
ecr:
  account: infra
deploy:
  # Repos scanned by `savi-deploy status`. name = table label, path = local clone.
  repos:
  - name: flock
    path: ~/code/github/savi/flock
  - name: Scamwise
    path: ~/code/github/savi/scamwise-service
  - name: Phony
    path: ~/code/github/savi/phony
  - name: re-scam
    path: ~/code/github/savi/re-scam
  - name: user
    path: ~/code/github/savi/user
  - name: voice-agent
    path: ~/code/github/savi/voice-agent
  - name: db
    path: ~/code/github/savi/db
  - name: scamwise-ui
    path: ~/code/github/savi/scamwise-ui
slack:
  display_name: Michael Knopf
  icon_emoji: ":rick-drool:"
  # default_channel intentionally unset — require --channel explicitly
  # team_id intentionally unset — slackTeamId is not yet wired through flock's CDK
  # (see SlackNotifyStack.slackTeamId), so deep links stay workspace-generic
  # until that env var is populated in deployments.
