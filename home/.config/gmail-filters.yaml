# gmail-filters config — declarative Gmail label/filter automation.
#
# Consumed by the mk plugin's gmail-filters.py (the /mk:gmail-filters command).
# Installed to ~/.config/gmail-filters.yaml; the script also honors $GMAIL_FILTERS_CONFIG.
#
# Multi-account: keyed by the managed email address under `accounts`. The script reads the
# active account from `gws auth status` and applies ONLY that account's stanza, so filters
# can never land in the wrong mailbox. To manage another address, add a sibling stanza.
#
# Each filter: criteria (Gmail filter criteria — from/to/subject/query/...), labels (1+,
# nested via "/"), and optional archive/markRead. Prefer `query: "list:(<list-id>)"` for
# mailing lists, and sender+subject patterns that match a recurring TEMPLATE over a bare
# `from:` (a bare-sender filter is barely better than a search).

