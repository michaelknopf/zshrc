model = "gpt-5.4"
model_reasoning_effort = "medium"
personality = "pragmatic"
approval_policy = "never"
sandbox_mode = "danger-full-access"

[plugins."github@openai-curated"]
enabled = true

[projects."/Users/mknopf/code/github/savi/flock"]
trust_level = "trusted"

[projects."/Users/mknopf/code/github/savi/voice-agent"]
trust_level = "trusted"

[projects."/Users/mknopf/code/github/savi/phony"]
trust_level = "trusted"

[projects."/Users/mknopf/code/github/michaelknopf/zshrc"]
trust_level = "trusted"

[mcp_servers.Oracle]
command = "oracle-mcp"

[mcp_servers.playwright]
command = "npx"
args = ["@playwright/mcp@latest"]

[mcp_servers.playwright-cdp]
command = "npx"
args = ["-y", "@playwright/mcp@latest", "--cdp-endpoint", "http://localhost:9222"]

[mcp_servers.livekit-docs]
url = "https://docs.livekit.io/mcp"
